<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activating — CIIP Flashcards</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .success-box {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .success-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--trace);
      border-top-color: var(--platinum);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .success-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: none;
    }
    .success-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .success-sub {
      font-size: 13px;
      color: var(--static);
      margin-bottom: 28px;
    }
    .success-btn {
      display: none;
      width: 100%;
      justify-content: center;
      margin-bottom: 12px;
    }
    .success-link {
      font-size: 13px;
      color: var(--static);
      display: none;
    }
    .success-link a { color: var(--static); text-decoration: underline; }
    .success-link a:hover { color: var(--signal); }
  </style>
</head>
<body>
<div class="success-page">
  <div class="success-box">
    <div class="success-spinner" id="spinner"></div>
    <div class="success-icon" id="icon"></div>
    <div class="success-title" id="title">Activating your subscription…</div>
    <div class="success-sub" id="sub">This usually takes just a moment.</div>
    <button class="btn-primary success-btn" id="go-btn" onclick="window.location.href='index.html'">Go to dashboard</button>
    <div class="success-link" id="fallback-link">
      <a href="account.html">Check account status</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
(async () => {
  const session = await Auth.requireAuth();
  if (!session) return;

  const MAX_ATTEMPTS = 10;
  const INTERVAL_MS = 2000;

  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    await new Promise(r => setTimeout(r, INTERVAL_MS));
    const sub = await Auth.getSubscription();
    if (sub && (sub.status === 'active' || sub.status === 'trialing')) {
      window.location.href = 'index.html';
      return;
    }
  }

  // Timed out — webhook may be delayed or failed
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('icon').textContent = '⚠️';
  document.getElementById('icon').style.display = 'block';
  document.getElementById('title').textContent = 'Taking longer than expected';
  document.getElementById('sub').textContent =
    'Your payment went through, but account activation is delayed. Check your account status — it may activate shortly.';
  document.getElementById('go-btn').style.display = 'flex';
  document.getElementById('go-btn').textContent = 'Try dashboard anyway';
  document.getElementById('fallback-link').style.display = 'block';
})();
</script>
</body>
</html>
