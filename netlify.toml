# Block internal working documents from being publicly readable.
# These files are kept in git for audit / methodology continuity, but
# they are not meant to be served on ciipflash.com. The actual public
# Learn pages will be rendered HTML at /learn/<slug>.html, generated
# from the markdown in learn-src/ at build time.

[[redirects]]
  from = "/METHODOLOGY.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/PRODUCT.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/DESIGN.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/DESIGN.json"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/decisions/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/learn-src/*"
  to = "/"
  status = 404
  force = true

# Defense-in-depth: cards.json has been moved into the gated function bundle
# at netlify/functions/get-cards/cards.json. Browsers/scripts that still
# request the old static path get a 404 instead of any data.
[[redirects]]
  from = "/cards.json"
  to = "/"
  status = 404
  force = true
